# Deploy Jekyll site to Pages
# Push: image assignment + author assignment + build + deploy (fast)
# Schedule/Manual: full maintenance (freshness, images, keywords, links, authors) + build + deploy
name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]

  schedule:
    - cron: '0 6 */4 * *'  # Every 4 days at 6 AM UTC

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Ruby
        uses: ruby/setup-ruby@4a9ddd6f338a97768b8006bf671dfbad383215f4
        with:
          ruby-version: '3.1'
          bundler-cache: true
          cache-version: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: pip install pyyaml

      # ── Schedule/manual only: freshness rotation ──
      - name: Update post freshness and rotate meta descriptions
        if: github.event_name != 'push'
        run: python _scripts/update_freshness.py --batch-size 15

      # ── Schedule/manual only: keyword audit ──
      - name: Run keyword audit
        if: github.event_name != 'push'
        run: python _scripts/keyword_audit.py

      # ── Schedule/manual only: link extraction + checking ──
      - name: Extract and check links
        if: github.event_name != 'push'
        run: python _scripts/extract_links.py

      # ── Push only: image + author assignment ──
      # On push these ensure the new post has an image and author immediately.
      # On schedule, freshness/keyword/links are the priority; images and
      # authors are already assigned from the original push.
      - name: Assign blog images to posts
        if: github.event_name == 'push'
        run: python _scripts/assign_blog_images.py

      - name: Assign authors to posts
        if: github.event_name == 'push'
        run: python _scripts/assign_authors.py

      # ── Push only: language tagging ──
      - name: Tag posts with language
        if: github.event_name == 'push'
        run: python _scripts/add_lang_field.py

      # ── Commit automated changes ──
      - name: Commit automated post updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/ _data/post_authors.yml
          if [ "${{ github.event_name }}" != "push" ]; then
            git add _data/freshness_manifest.json _data/meta_variants.json admin/keyword-audit-data.json admin/links-data.json _data/links_check_cache.json 2>/dev/null || true
          fi
          git diff --cached --quiet || git commit -m "chore: refresh posts - images, authors [skip ci]"
          git push

      - name: Generate related posts data
        if: github.event_name == 'push'
        run: python _scripts/generate_related_posts.py
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
